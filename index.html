<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELE+</title>
    <style>
        :root {
            --bg: #0b0f14;
            --card: #111827;
            --card-hover: #1f2933;
            --primary: #3b82f6;
            --text: #e5e7eb;
            --text-secondary: #9ca3af;
            --border: #1f2937;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(1200px 600px at 20% -10%, #111827, #0b0f14);
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
            color: var(--text);
        }
        .container { width: 100%; max-width: 640px; }
        
        .search-container {
            position: sticky;
            top: 12px;
            z-index: 10;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            background: rgba(17,24,39,0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 16px;
            border: 1px solid var(--border);
        }
        .search-container input { border: none; outline: none; flex-grow: 1; padding: 8px; font-size: 1rem; }
        .search-container input {
            background: transparent;
            color: var(--text);
        }
        .search-container input::placeholder {
            color: var(--text-secondary);
        }
        .clear-search { cursor: pointer; font-size: 1.5rem; color: #9ca3af; display: none; }

        .day-heading {
            margin: 32px 0 12px 6px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .match-card {
            background: linear-gradient(180deg, var(--card), #0f172a);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .match-card:hover {
            transform: translateY(-2px);
            background: linear-gradient(180deg, var(--card-hover), #0f172a);
        }
        .row-1 { display: flex; justify-content: space-between; align-items: center; }
        .time-badge {
            background: #020617;
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--border);
        }
        .lang-badge {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(59,130,246,0.15);
            color: #17C8AB;
            padding: 4px 10px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .lang-icon {
            font-size: 1rem;
        }
        .name-row {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.5;
            color: var(--text);
        }
        .watch-button-wrapper { display: flex; flex-direction: column; align-items: center; gap: 24px;}
        .watch-button {
            background: linear-gradient(135deg, #17C8AB, #0fd3bc);
            color: #111827;
            text-align: center;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            text-transform: uppercase;
        }
        .watch-button:hover {
            transform: translateY(-1px);
        }
        a{
            text-decoration: none;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-style: italic;
        }
        .vs {
            font-style: italic;
            font-size: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Cerca partita o squadra...">
        <span id="clear-search" class="clear-search">&times;</span>
    </div>
    
    <div id="match-list" class="loading">Caricamento partite in corso...</div>
</div>

<script>
    const PROXY_URL = 'https://corsproxy.io/?';
    const DATA_SOURCE = 'https://sportsonline.st/prog.txt';

    const DAYS = [
        'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY',
        'FRIDAY', 'SATURDAY', 'SUNDAY',
    ];

    const DAY_TRANSLATION = {
        'MONDAY': 'Lunedì',
        'TUESDAY': 'Martedì',
        'WEDNESDAY': 'Mercoledì',
        'THURSDAY': 'Giovedì',
        'FRIDAY': 'Venerdì',
        'SATURDAY': 'Sabato',
        'SUNDAY': 'Domenica'
    };

    let allData = [];

    async function init() {
        try {
            const response = await fetch(PROXY_URL + encodeURIComponent(DATA_SOURCE));
            const text = await response.text();
            parseData(text);
            render(allData);
        } catch (error) {
            document.getElementById('match-list').innerHTML = 'Errore nel caricamento dei dati.';
            console.error(error);
        }
    }

    function parseData(rawText) {
        const lines = rawText.split('\n').map(line => line.trim());
        const languageMap = {};
        let currentDay = 'Prossimi Eventi';
        const processedDays = [];

        const languagePattern = /^([A-Z0-9]+)\s+(.+)$/;
        const matchPattern = /^(\d{2}:\d{2})\s+(.*?)\s*\|\s*(https?:\/\/[^\s]+)/i;

        lines.forEach(line => {
            if (!line) return;

            if (DAYS.includes(line.toUpperCase())) {
                const dayKey = line.toUpperCase();
                currentDay = DAY_TRANSLATION[dayKey] || dayKey;
                processedDays.push({ day: currentDay, matches: [] });
                return;
            }

            if (languagePattern.test(line) && !line.includes('|') && !line.includes('https')) {
                const [, code, language] = line.match(languagePattern);
                languageMap[code.toLowerCase()] = language
                    .replace('ENGLISH', 'INGLESE')
                    .replace('SPANISH', 'SPAGNOLO')
                    .replace('GERMAN', 'TEDESCO')
                    .replace('ITALIAN', 'ITALIANO')
                    .replace('BRAZILIAN', 'PORTOGHESE');
                return;
            }

            if (matchPattern.test(line)) {
                const [, time, name, url] = line.match(matchPattern);
                const fileKey = url.split('/').pop().split('.')[0].toLowerCase();
                const language = languageMap[fileKey] || null;

                if (processedDays.length === 0) {
                    processedDays.push({ day: currentDay, matches: [] });
                }

                processedDays[processedDays.length - 1].matches.push({
                    time,
                    name,
                    url,
                    language
                });
            }
        });

        allData = processedDays;
    }

    function render(data) {
        const list = document.getElementById('match-list');
        let html = '';

        data.forEach(group => {
            if (group.matches.length === 0) return;

            html += `<div class="day-heading">${group.day}</div>`;
            group.matches.forEach(match => {
                html += `
                    <a href="${match.url}" target="_blank">
                        <div class="match-card">
                            <div class="row-1">
                                <span class="time-badge">${match.time} UK</span>
                                <span class="time-badge">${String((parseInt(match.time.split(':')[0], 10) + 1) % 24).padStart(2,'0')}:${match.time.split(':')[1]} IT</span>
                            </div>
                            <div class="name-row">${match.name.replace(/^NBA:\s*/i, '').replace(/\s+x\s+/gi, '<br /><span class="vs">contro</span><br />').replace(/\s+@\s+/gi, '<br /><span class="vs">contro</span><br />')}</div>
                            <div class="watch-button-wrapper">
                                <span class="watch-button">Guarda Ora</span>
                                ${match.language ? `<span class="lang-badge"><span class="lang-icon">🎙️</span> ${match.language}</span>` : ''}
                            </div>
                        </div>
                    </a>
                `;
            });
        });

        list.innerHTML = html || '<div class="no-results">Nessuna partita trovata.</div>';
    }

    document.getElementById('search-input').addEventListener('input', event => {
        const query = event.target.value.toLowerCase();
        document.getElementById('clear-search').style.display = query ? 'block' : 'none';

        const filtered = allData
            .map(group => ({
                ...group,
                matches: group.matches.filter(m => m.name.toLowerCase().includes(query))
            }))
            .filter(group => group.matches.length > 0);

        render(filtered);
    });

    document.getElementById('clear-search').onclick = () => {
        const input = document.getElementById('search-input');
        input.value = '';
        document.getElementById('clear-search').style.display = 'none';
        render(allData);
        input.focus();
    };

    init();
</script>

</body>
</html>
