<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match List Extractor</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 { color: #1a73e8; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .match-row {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .match-row:hover { background: #f8f9fa; }
        .match-row:last-child { border-bottom: none; }

        .match-info { font-weight: 500; color: #333; }
        
        .btn-link {
            background: #1a73e8;
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .btn-link:hover { background: #1557b0; }

        .loading { text-align: center; color: #666; padding: 40px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Today's Matches</h2>
        <div id="match-list" class="loading">Fetching and filtering matches...</div>
    </div>

    <script>
        const PROXY = 'https://corsproxy.io/?';
        const TARGET = 'https://sportsonline.st/prog.txt';
        const listContainer = document.getElementById('match-list');

        async function fetchMatches() {
            try {
                const response = await fetch(PROXY + encodeURIComponent(TARGET));
                const text = await response.text();
                
                // 1. Split text into individual lines
                const lines = text.split('\n');

                // 2. Define the regex pattern:
                // ^\d{2}:\d{2} -> Starts with 00:00 format
                // .*\|         -> Any characters until the pipe symbol
                // \s*https?    -> Optional spaces followed by the link
                const matchPattern = /^(\d{2}:\d{2}.*?)\|\s*(https?:\/\/[^\s]+)/i;

                const filteredRows = lines
                    .map(line => line.trim())
                    .filter(line => matchPattern.test(line)) // Only keep match lines
                    .map(line => {
                        const parts = line.match(matchPattern);
                        return {
                            info: parts[1].trim(),
                            url: parts[2].trim()
                        };
                    });

                renderMatches(filteredRows);

            } catch (err) {
                listContainer.innerHTML = 'Failed to load match data.';
                console.error(err);
            }
        }

        function renderMatches(matches) {
            if (matches.length === 0) {
                listContainer.innerHTML = 'No matches found.';
                return;
            }

            listContainer.innerHTML = matches.map(m => `
                <div class="match-row">
                    <span class="match-info">${m.info}</span>
                    <a href="${m.url}" class="btn-link" target="_blank">Watch</a>
                </div>
            `).join('');
        }

        fetchMatches();
    </script>
</body>
</html>
